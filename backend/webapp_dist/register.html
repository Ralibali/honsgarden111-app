<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skapa konto - Hönsgården</title>
    <link rel="icon" type="image/svg+xml" href="/api/web/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #1a1a24;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --accent-green: #4ade80;
            --border-color: rgba(255, 255, 255, 0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .header-content {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-primary);
        }
        
        .logo-icon { font-size: 2rem; }
        .logo-text { font-size: 1.25rem; font-weight: 700; }
        
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 1.5rem;
            padding: 2rem;
        }
        
        .step { display: none; }
        .step.active { display: block; }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            text-align: center;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        
        .trial-badge {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.875rem;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        
        .email-highlight {
            color: var(--accent-green);
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent-green);
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        /* Checkbox styles */
        .checkbox-group {
            margin: 1.5rem 0;
        }
        
        .checkbox-label {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }
        
        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--accent-green);
            flex-shrink: 0;
        }
        
        .checkbox-label a {
            color: var(--accent-green);
        }
        
        .required { color: #ef4444; }
        
        /* Code input styles */
        .code-inputs {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        
        .code-input {
            width: 48px;
            height: 56px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            transition: border-color 0.2s;
        }
        
        .code-input:focus {
            outline: none;
            border-color: var(--accent-green);
        }
        
        .primary-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border: none;
            border-radius: 0.75rem;
            color: #000;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .primary-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }
        
        .primary-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .secondary-btn {
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.875rem;
            cursor: pointer;
            margin-top: 1rem;
        }
        
        .secondary-btn:hover {
            color: var(--accent-green);
        }
        
        .secondary-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .resend-btn {
            color: var(--accent-green);
        }
        
        .resend-btn:disabled {
            color: var(--text-secondary);
        }
        
        .status {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.875rem;
            display: none;
        }
        
        .status.visible { display: block; }
        
        .status.success {
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
        }
        
        .status.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .login-link a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 500;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        /* Success state */
        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        
        .success-icon ion-icon {
            font-size: 2.5rem;
            color: var(--accent-green);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <span class="logo-icon">🐔</span>
                <span class="logo-text">Hönsgården</span>
            </a>
        </div>
    </header>
    
    <main class="main">
        <div class="container">
            <div class="card">
                <!-- Step 1: Registration Form -->
                <div id="step1" class="step active">
                    <h1>Skapa konto</h1>
                    <div style="text-align: center;">
                        <span class="trial-badge">🎁 7 dagars gratis Premium!</span>
                    </div>
                    
                    <div id="status1" class="status"></div>
                    
                    <div class="form-group">
                        <label for="name">Namn <span class="required">*</span></label>
                        <input type="text" id="name" placeholder="Ditt namn" autocomplete="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">E-postadress <span class="required">*</span></label>
                        <input type="email" id="email" placeholder="din@email.se" autocomplete="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Lösenord <span class="required">*</span></label>
                        <input type="password" id="password" placeholder="Minst 6 tecken" autocomplete="new-password" required>
                    </div>
                    
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="acceptTerms" required>
                            <span>Jag godkänner <a href="/api/terms" target="_blank">användarvillkoren</a> och <a href="/api/privacy" target="_blank">integritetspolicyn</a> <span class="required">*</span></span>
                        </label>
                        
                        <label class="checkbox-label">
                            <input type="checkbox" id="acceptMarketing">
                            <span>Jag vill få nyhetsbrev och erbjudanden via e-post</span>
                        </label>
                    </div>
                    
                    <button id="registerBtn" class="primary-btn" onclick="startRegistration()">
                        <span>Skapa konto</span>
                    </button>
                    
                    <div class="login-link">
                        Har du redan ett konto? <a href="/api/web">Logga in</a>
                    </div>
                </div>
                
                <!-- Step 2: Enter Verification Code -->
                <div id="step2" class="step">
                    <h1>Verifiera din e-post</h1>
                    <p class="subtitle">
                        En 6-siffrig kod har skickats till<br>
                        <span id="emailDisplay" class="email-highlight"></span>
                    </p>
                    
                    <div id="status2" class="status"></div>
                    
                    <div class="code-inputs">
                        <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
                        <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
                        <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
                        <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
                        <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
                        <input type="text" class="code-input" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    </div>
                    
                    <button id="verifyBtn" class="primary-btn" onclick="verifyCode()">
                        <span>Verifiera</span>
                    </button>
                    
                    <button id="resendBtn" class="secondary-btn resend-btn" onclick="resendCode()">
                        Skicka ny kod
                    </button>
                    
                    <button class="secondary-btn" onclick="goToStep(1)">
                        ← Ändra uppgifter
                    </button>
                </div>
                
                <!-- Step 3: Success -->
                <div id="step3" class="step">
                    <div class="success-icon">
                        <ion-icon name="checkmark-circle"></ion-icon>
                    </div>
                    <h1>Välkommen! 🎉</h1>
                    <p class="subtitle">
                        Ditt konto är skapat och du har nu 7 dagars gratis Premium-åtkomst.
                    </p>
                    
                    <a href="/api/web" class="primary-btn" style="text-decoration: none;">
                        <ion-icon name="home"></ion-icon>
                        <span>Gå till Hönsgården</span>
                    </a>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        let userEmail = '';
        let cooldown = 0;
        let cooldownInterval = null;
        
        const codeInputs = document.querySelectorAll('.code-input');
        
        // Setup code input navigation
        codeInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                const value = e.target.value.replace(/[^0-9]/g, '');
                e.target.value = value;
                
                if (value && index < 5) {
                    codeInputs[index + 1].focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    codeInputs[index - 1].focus();
                }
            });
            
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text');
                const digits = paste.replace(/[^0-9]/g, '').slice(0, 6);
                
                digits.split('').forEach((digit, i) => {
                    if (codeInputs[i]) {
                        codeInputs[i].value = digit;
                    }
                });
                
                if (digits.length > 0) {
                    codeInputs[Math.min(digits.length, 5)].focus();
                }
            });
        });
        
        function goToStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
        }
        
        function showStatus(stepNum, message, type) {
            const status = document.getElementById(`status${stepNum}`);
            status.textContent = message;
            status.className = `status visible ${type}`;
        }
        
        function hideStatus(stepNum) {
            document.getElementById(`status${stepNum}`).className = 'status';
        }
        
        function setLoading(btn, loading) {
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<div class="spinner"></div>';
            } else {
                btn.disabled = false;
            }
        }
        
        function startCooldown() {
            cooldown = 60;
            updateResendButton();
            
            cooldownInterval = setInterval(() => {
                cooldown--;
                updateResendButton();
                
                if (cooldown <= 0) {
                    clearInterval(cooldownInterval);
                }
            }, 1000);
        }
        
        function updateResendButton() {
            const btn = document.getElementById('resendBtn');
            if (cooldown > 0) {
                btn.textContent = `Skicka ny kod (${cooldown}s)`;
                btn.disabled = true;
            } else {
                btn.textContent = 'Skicka ny kod';
                btn.disabled = false;
            }
        }
        
        async function startRegistration() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const acceptTerms = document.getElementById('acceptTerms').checked;
            const acceptMarketing = document.getElementById('acceptMarketing').checked;
            
            // Validation
            if (!name) {
                showStatus(1, 'Ange ditt namn', 'error');
                return;
            }
            if (!email) {
                showStatus(1, 'Ange din e-postadress', 'error');
                return;
            }
            if (password.length < 6) {
                showStatus(1, 'Lösenordet måste vara minst 6 tecken', 'error');
                return;
            }
            if (!acceptTerms) {
                showStatus(1, 'Du måste godkänna användarvillkoren', 'error');
                return;
            }
            
            hideStatus(1);
            const btn = document.getElementById('registerBtn');
            setLoading(btn, true);
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        email,
                        password,
                        accepted_terms: acceptTerms,
                        accepted_marketing: acceptMarketing
                    })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    showStatus(1, data.detail || 'Något gick fel', 'error');
                    btn.innerHTML = '<span>Skapa konto</span>';
                    btn.disabled = false;
                    return;
                }
                
                // Success - move to verification step
                userEmail = email;
                document.getElementById('emailDisplay').textContent = email;
                startCooldown();
                goToStep(2);
                codeInputs[0].focus();
                
            } catch (error) {
                showStatus(1, 'Kunde inte ansluta till servern', 'error');
            } finally {
                btn.innerHTML = '<span>Skapa konto</span>';
                btn.disabled = false;
            }
        }
        
        async function verifyCode() {
            const code = Array.from(codeInputs).map(i => i.value).join('');
            
            if (code.length !== 6) {
                showStatus(2, 'Ange den 6-siffriga koden', 'error');
                return;
            }
            
            hideStatus(2);
            const btn = document.getElementById('verifyBtn');
            setLoading(btn, true);
            
            try {
                const res = await fetch('/api/auth/verify-registration', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email: userEmail, code })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    // Success - show welcome screen
                    goToStep(3);
                } else {
                    showStatus(2, data.detail || 'Felaktig kod', 'error');
                }
                
            } catch (error) {
                showStatus(2, 'Kunde inte verifiera koden', 'error');
            } finally {
                btn.innerHTML = '<span>Verifiera</span>';
                btn.disabled = false;
            }
        }
        
        async function resendCode() {
            if (cooldown > 0) return;
            
            hideStatus(2);
            const btn = document.getElementById('resendBtn');
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/auth/resend-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showStatus(2, 'Ny kod skickad!', 'success');
                    startCooldown();
                    codeInputs.forEach(input => input.value = '');
                    codeInputs[0].focus();
                } else {
                    showStatus(2, data.detail || 'Kunde inte skicka ny kod', 'error');
                    btn.disabled = false;
                }
                
            } catch (error) {
                showStatus(2, 'Kunde inte skicka ny kod', 'error');
                btn.disabled = false;
            }
        }
        
        // Handle Enter key
        document.getElementById('name').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('email').focus();
        });
        
        document.getElementById('email').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startRegistration();
        });
    </script>
</body>
</html>
